name: 'Merge and upload coverage data'
description: 'Compresses and uploads the coverage data as an artifact'

inputs:
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true

runs:
  using: "composite"
  steps:
    - name: Merge coverage data
      shell: bash -ex {0}
      run: scripts/coverage "--profraw-prefix=$GITHUB_JOB" --dir=/tmp/coverage merge

    - name: Stash current coverage data
      shell: bash -ex {0}
      run: mv /tmp/coverage /tmp/coverage-current

    - name: Download previous coverage data
      uses: ./.github/actions/download
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        key: coverage-data-artifact

    - name: Merge current coverage data with previous
      shell: bash -ex {0}
      run: |
        rsync -a /tmp/coverage-current/ /tmp/coverage/
        rm -rf /tmp/coverage-current

    - name: Upload coverage data
      uses: ./.github/actions/upload
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        key: coverage-data-artifact
        artifacts: |
          /tmp/coverage/
