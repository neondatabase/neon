name: 'Run python test'
description: 'Runs a Neon python test set, performing all the required preparations before'

inputs:
  build_type:
    description: 'Type of Rust (neon) and C (postgres) builds. Must be "release" or "debug".'
    required: true
  rust_toolchain:
    description: 'Rust toolchain version to fetch the caches'
    required: true
  test_selection:
    description: 'A python test suite to run'
    required: true
  extra_params:
    description: 'Arbitrary parameters to pytest. For example "-s" to prevent capturing stdout/stderr'
    required: false
    default: ''
  needs_postgres_source:
    description: 'Set to true if the test suite requires postgres source checked out'
    required: false
    default: 'false'
  run_in_parallel:
    description: 'Whether to run tests in parallel'
    required: false
    default: 'true'
  save_perf_report:
    description: 'Whether to upload the performance report'
    required: false
    default: 'false'
  aws-access-key-id-neon-tests-report:
    description: 'AWS_ACCESS_KEY_ID for report publishing'
    required: true
  aws-secret-access-key-neon-tests-report:
    description: 'AWS_SECRET_ACCESS_KEY for report publishing'
    required: true

runs:
  using: "composite"
  steps:
    - name: Get Neon artifact for restoration
      uses: actions/download-artifact@v3
      with:
        name: neon-${{ runner.os }}-${{ inputs.build_type }}-${{ inputs.rust_toolchain }}-artifact
        path: ./neon-artifact/

    - name: Extract Neon artifact
      shell: bash -ex {0}
      run: |
        mkdir -p /tmp/neon/
        tar -xf ./neon-artifact/neon.tar.zst -C /tmp/neon/
        rm -rf ./neon-artifact/

    - name: Checkout
      if: inputs.needs_postgres_source == 'true'
      uses: actions/checkout@v3
      with:
        submodules: true
        fetch-depth: 1

    - name: Cache poetry deps
      id: cache_poetry
      uses: actions/cache@v3
      with:
        path: ~/.cache/pypoetry/virtualenvs
        key: v1-${{ runner.os }}-python-deps-${{ hashFiles('poetry.lock') }}

    - name: Install Python deps
      shell: bash -ex {0}
      run: ./scripts/pysync

    - name: Run pytest
      env:
        NEON_BIN: /tmp/neon/bin
        POSTGRES_DISTRIB_DIR: /tmp/neon/pg_install
        TEST_OUTPUT: /tmp/test_output
        # this variable will be embedded in perf test report
        # and is needed to distinguish different environments
        PLATFORM: github-actions-selfhosted
      shell: bash -ex {0}
      run: |
        PERF_REPORT_DIR="$(realpath test_runner/perf-report-local)"
        rm -rf $PERF_REPORT_DIR

        TEST_SELECTION="test_runner/${{ inputs.test_selection }}"
        EXTRA_PARAMS="${{ inputs.extra_params }}"
        if [ -z "$TEST_SELECTION" ]; then
          echo "test_selection must be set"
          exit 1
        fi
        if [[ "${{ inputs.run_in_parallel }}" == "true" ]]; then
          EXTRA_PARAMS="-n4 $EXTRA_PARAMS"
        fi
        if [[ "${{ inputs.save_perf_report }}" == "true" ]]; then
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            mkdir -p "$PERF_REPORT_DIR"
            EXTRA_PARAMS="--out-dir $PERF_REPORT_DIR $EXTRA_PARAMS"
          fi
        fi

        if [[ "${{ inputs.build_type }}" == "debug" ]]; then
          cov_prefix=(scripts/coverage "--profraw-prefix=$GITHUB_JOB" --dir=/tmp/coverage run)
        elif [[ "${{ inputs.build_type }}" == "release" ]]; then
          cov_prefix=()
        fi

        # Run the tests.
        #
        # The junit.xml file allows CI tools to display more fine-grained test information
        # in its "Tests" tab in the results page.
        # --verbose prints name of each test (helpful when there are
        # multiple tests in one file)
        # -rA prints summary in the end
        # -n4 uses four processes to run tests via pytest-xdist
        # -s is not used to prevent pytest from capturing output, because tests are running
        # in parallel and logs are mixed between different tests
        "${cov_prefix[@]}" ./scripts/pytest \
          --junitxml=$TEST_OUTPUT/junit.xml \
          --alluredir=$TEST_OUTPUT/allure-results \
          --tb=short \
          --verbose \
          -m "not remote_cluster" \
          -rA $TEST_SELECTION $EXTRA_PARAMS

        if [[ "${{ inputs.save_perf_report }}" == "true" ]]; then
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            export REPORT_FROM="$PERF_REPORT_DIR"
            export REPORT_TO=local
            scripts/generate_and_push_perf_report.sh
          fi
        fi

    - uses: actions/setup-java@v3
      if: always()
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Allure
      if: always()
      shell: bash -ex {0}
      run: |
        ALLURE_ZIP=allure-${ALLURE_VERSION}.zip

        wget -q https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/${ALLURE_ZIP}
        echo "${ALLURE_ZIP_MD5}  ${ALLURE_ZIP}" | md5sum -c

        unzip -q ${ALLURE_ZIP}
        echo "$(pwd)/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH
      env:
        ALLURE_VERSION: 2.18.1
        ALLURE_ZIP_MD5: 603d235e3d47844a848591e55e7a29f6

    - name: Generate Allure Report
      if: always()
      shell: bash -ex {0}
      run: |
        cat <<EOF > $TEST_OUTPUT/allure-results/executor.json
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://neon-tests.s3.amazonaws.com/neon/index.html",
            "buildOrder": ${GITHUB_RUN_ID},
            "buildName": "GitHub Actions Run #${{ github.run_number }}",
            "buildUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}",
            "reportUrl": "https://neon-tests.s3.amazonaws.com/neon/${GITHUB_RUN_ID}/${{ inputs.test_selection }}-${{ runner.os }}-${{ inputs.build_type }}-${{ inputs.rust_toolchain }}/index.html",
            "reportName": "Allure Report"
          }
        EOF

        cat <<EOF > $TEST_OUTPUT/allure-results/environment.properties
          TEST_SELECTION=${{ inputs.test_selection }}
          OS=${{ runner.os }}
          BUILD_TYPE=${{ inputs.build_type }}
          RUST_TOOLCHAIN=${{ inputs.rust_toolchain }}
        EOF

        allure generate --clean --output $TEST_OUTPUT/allure-report $TEST_OUTPUT/allure-results
      env:
        TEST_OUTPUT: /tmp/test_output

    - name: Install AWS CLI
      if: always()
      shell: bash -ex {0}
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-${AWSCLI_VERSION}.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip

        ./aws/install --install-dir "$(pwd)/aws-cli" --bin-dir "$(pwd)/bin-dir"

        echo "$(pwd)/bin-dir" >> $GITHUB_PATH
      env:
        AWSCLI_VERSION: 2.7.18
        AWSCLI_ZIP_MD5: df6c7c8fa261ed9e0bb5d2f42650295d

    - name: Upload Allure Report
      if: always()
      shell: bash -ex {0}
      run: |
        REMOTE_DIR="neon/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${{ inputs.test_selection }}-${{ runner.os }}-${{ inputs.build_type }}-${{ inputs.rust_toolchain }}"
        aws s3 cp "${TEST_OUTPUT}/allure-report" "s3://${BUCKET}/${REMOTE_DIR}" --recursive

        # Ref https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#adding-a-job-summary
        echo "[Allure Report](https://${BUCKET}.s3.amazonaws.com/${REMOTE_DIR}/index.html)" >> ${GITHUB_STEP_SUMMARY}
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id-neon-tests-report }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key-neon-tests-report }}
        BUCKET: neon-tests
        TEST_OUTPUT: /tmp/test_output

    - name: Delete all data but logs
      shell: bash -ex {0}
      if: always()
      run: |
        du -sh /tmp/test_output/*
        find /tmp/test_output -type f ! -name "*.log" ! -name "regression.diffs" ! -name "junit.xml" ! -name "*.filediff" ! -name "*.stdout" ! -name "*.stderr" ! -name "flamegraph.svg" ! -name "*.metrics" -delete
        du -sh /tmp/test_output/*

    - name: Upload python test logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        retention-days: 7
        if-no-files-found: error
        name: python-test-${{ inputs.test_selection }}-${{ runner.os }}-${{ inputs.build_type }}-${{ inputs.rust_toolchain }}-logs
        path: /tmp/test_output/
