name: "Download an artifact"
description: "Custom download action"
inputs:
  name:
    description: "Artifact name"
    required: true
  path:
    description: "A directory to put artifact into"
    required: false

runs:
  using: "composite"
  steps:
    - name: Download artifact
      shell: bash -ex {0}
      env:
        TARGET: ${{ inputs.path || '.' }}
        ARCHIVE: /tmp/downloads/${{ inputs.name }}.tar.zst
      run: |
        mkdir -p $(dirname $ARCHIVE)
        time aws s3 cp --only-show-errors s3://neon-dev-bucket/artifacts/${GITHUB_RUN_ID}/$(basename $ARCHIVE) ${ARCHIVE}

    - name: Extract artifact
      shell: bash -ex {0}
      env:
        TARGET: ${{ inputs.path || '.' }}
        ARCHIVE: /tmp/downloads/${{ inputs.name }}.tar.zst
      run: |
        mkdir -p ${TARGET}
        time tar -xf ${ARCHIVE} -C ${TARGET}
        rm -f ${ARCHIVE}
